# adsb-radar configuration file
#
# Search order: ./adsb-radar.ini  →  ~/.config/adsb-radar/adsb-radar.ini
# The first file found is used; missing keys fall back to built-in defaults.
#
# Syntax:
#   key = value          plain assignment
#   # ...                comment (inline or whole line)
#   true / false         booleans (also accept 1 / 0)
#   R,G,B,A              colours; each component 0-255, alpha optional (default 255)
#
# ─────────────────────────────────────────────────────────────────────────────

[network]
# Hostname or IP address of the ADS-B data source (dump1090-fa, readsb, etc.).
# Default: 127.0.0.1
host             = 127.0.0.1
# HTTP port serving /data/aircraft.json.  Default: 8080
port             = 8080
# How often to fetch new aircraft data, in milliseconds.  Default: 1000
poll_interval_ms = 250
# Path to a local aircraft.json file.
# When set, HTTP polling is skipped and this file is re-read
# every poll_interval_ms instead.
# Example: /run/dump1090-fa/aircraft.json.  Default: /tmp/aircraft.json
local_json = /tmp/aircraft.json

[display]
# Window size in pixels.  0 × 0 lets SDL choose (fills screen on KMS/DRM).
# Default: 0, 0
width            = 0
height           = 0
# Start in fullscreen mode.  On KMS/DRM this is always effectively fullscreen.
# Default: true
fullscreen       = false
# Show the on-screen zoom / pan / CTR / GPS buttons.  Default: true
show_buttons     = true
# Show the RSSI column in the aircraft list panel.  Default: false
show_rssi_column = false
# Show an EXIT button in the bottom-left corner (useful on touch-only devices).
# Default: true 
exit_button      = true 
# Draw a circle whose radius equals the farthest aircraft seen from the
# reference point (config center or live GPS fix).  Default: false
max_range_circle = true
# Fill the interior of the max-range circle (drawn behind all other layers).
# Default: false
max_range_fill   = true
# Force a specific SDL video driver.  Leave blank for auto-detect (recommended).
#   kmsdrm  — bare TTY on Raspberry Pi (no desktop compositor)
#   x11     — force X11 on a desktop
#   wayland — force Wayland on a desktop
# Default: (empty — SDL auto-detects)
video_driver     = kmsdrm
# KMS/DRM device index (0 = first /dev/dri/card*) 
# If you see an error like the following, try another card number:
#  ERROR: SDL_Init failed: error getting KMSDRM displays information
# Default: 0
kmsdrm_device    = 0

[map]
# Map layers — up to 16, indexed 0..15.
#   layer_N       = path to a .geojson or .shp file (relative to the binary)
#   layer_N_color = R,G,B,A colour override; omit to use [colours] map default
# Layers are drawn in order: 0 is bottom, 15 is top.
layer_0          = world_coastlines.geojson
layer_0_color    = 60,80,60,255
layer_1          = world_airports.geojson
layer_1_color    = 80,140,200,220

[view]
# Geographic centre of the map on startup, in decimal degrees.
# Default: 0.0, 0.0
center_lat       = -34.9127
center_lon       = 138.6813
# Initial zoom level: pixels per degree of longitude.
# Higher = more zoomed in.  Default: 800.0
zoom_level       = 800.0

[units]
# Measurement system for speed, altitude, and distance labels.
#   imperial — nautical miles, knots, feet
#   metric   — kilometres, km/h, metres
# Default: imperial
system = metric

[aircraft]
# Aircraft are hidden entirely after this many seconds without any message.
# Default: 30.0
max_age_seconds    = 60.0
# Aircraft begin fading once silent for this many seconds (≤ max_age_seconds).
# Default: 20.0
fade_start_seconds = 200
# Seconds without a position update before the dot and trail turn grey.
# Default: 10.0
inactive_seconds   = 10.0
# Length of position-history trail in seconds.  0 disables trails entirely.
# Trails use a circular buffer capped at 300 points per aircraft.  Default: 0
trail_seconds      = 600
# Radius of the aircraft position dot, in pixels.  Default: 5.0
dot_radius         = 7.0
# Length of the heading indicator line at 500 kt, in pixels.
# Scales linearly with ground speed; hidden if speed is unknown.  Default: 20.0
heading_line_length = 40.0

[font]
# TTF font for aircraft callsign / altitude labels (path relative to binary).
# Default: assets/fonts/DejaVuSans.ttf
path         = assets/fonts/DejaVuSans.ttf
# Label font size in points.  Default: 12.0
size_pt      = 22.0
# Font for the collapsible aircraft list panel.  Default: (empty — same as path)
# list_path    = assets/fonts/DejaVuSans.ttf
# List panel font size in points.  0 = same as size_pt.  Default: 0
# list_size_pt = 16.0

[gps]
# Enable the serial GPS thread.  When false, no thread is started and the GPS
# button / own-position marker are not shown.  Default: false
enabled       = false
# Serial device for NMEA input ($GPRMC / $GPGGA, GP and GN talker IDs).
# Default: /dev/ttyACM0
port          = /dev/ttyACM0
# Serial baud rate.  Default: 9600
baud          = 9600
# If true, GPS re-centring is active immediately on startup.  Default: false
lock_on_start = false

[colours]
# All colours are R,G,B,A with components 0-255.  Alpha 255 = fully opaque.
# Screen background fill.
background    = 10,10,20,255
# Default polyline colour for map layers without a per-layer colour override.
map           = 60,80,60,255
# Dynamic range rings drawn around the reference point.
range_circle  = 0,80,160,200
# Aircraft dot colour for unknown altitude (altitude-known dots use an HSV ramp).
aircraft      = 0,220,0,255
# Heading indicator lines drawn from each aircraft dot.
heading       = 0,200,200,255
# Aircraft callsign / altitude label text.
label         = 200,200,200,220
# Own-position marker (filled circle + cross) shown when GPS has a fix.
gps_marker    = 255,220,0,255
# Outline of the max-range circle (max_range_circle = true).
max_range      = 0,160,80,200
# Fill colour of the max-range circle interior (max_range_fill = true).
max_range_fill = 0,160,80,30
# Dot and trail colour for aircraft with no recent position update.
inactive       = 130,130,130,255
